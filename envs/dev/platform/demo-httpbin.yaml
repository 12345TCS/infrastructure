apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: httpbin-kong
  namespace: demo
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/strip-path: "true"
spec:
  rules:
    - http:
        paths:
          - path: /demo
            pathType: Prefix
            backend:
              service:
                name: httpbin
                port:
                  number: 80
